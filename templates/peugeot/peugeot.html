<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peugeot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #080d1a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            padding: 22px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 0.3em;
        }
        nav a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            margin-left: 28px;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: #fff; }
        .hero {
            text-align: center;
            padding: 56px 48px 12px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 0.2em;
        }
        .accent-line {
            width: 56px;
            height: 3px;
            background: #003189;
            margin: 18px auto;
            border-radius: 2px;
        }
        .hero p {
            color: rgba(255,255,255,0.4);
            font-size: 0.95rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        .cards {
            display: flex;
            gap: 20px;
            max-width: 820px;
            padding: 36px 32px 52px;
            width: 100%;
        }
        .card {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 24px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: background 0.2s, border-color 0.2s;
        }
        .card:hover {
            background: rgba(0,49,137,0.2);
            border-color: rgba(0,49,137,0.5);
        }
        .card .label {
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.38);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .card .value { font-size: 1.15rem; font-weight: 600; }
        footer {
            margin-top: auto;
            padding: 20px;
            color: rgba(255,255,255,0.18);
            font-size: 0.75rem;
            letter-spacing: 0.06em;
        }
    </style>
</head>
<body>
    <header>
        <span class="logo-text">PEUGEOT</span>
        <nav>
            <a href="/masini">Masini</a>
            <a href="/masini/peugeot" class="active">Peugeot</a>
            <a href="/masini/peugeot/culoare">Culoare</a>
            <a href="/masini/peugeot/descriere">Descriere</a>
        </nav>
    </header>

    <div class="hero">
        <h1>PEUGEOT 208</h1>
        <div class="accent-line"></div>
        <p>Motion &amp; Emotion</p>
    </div>

    <div class="cards">
        <a class="card" href="/masini/peugeot/culoare">
            <div class="label">Culoare</div>
            <div class="value">Albastru</div>
        </a>
        <a class="card" href="/masini/peugeot/descriere">
            <div class="label">Motor</div>
            <div class="value">1.2L PureTech</div>
        </a>
        <a class="card" href="/masini/peugeot/descriere">
            <div class="label">Putere</div>
            <div class="value">100 CP</div>
        </a>
        <a class="card" href="/masini/peugeot/descriere">
            <div class="label">0 – 100 km/h</div>
            <div class="value">9.9 s</div>
        </a>
    </div>

    <footer>© 2024 Peugeot Automobiles S.A.S. — Tous droits réservés</footer>
</body>
</html>
